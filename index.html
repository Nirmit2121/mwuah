<!DOCTYPE html>

  <link rel="manifest" href="manifest.webmanifest" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mwuah" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />

<body>
  <div class="app">
    <header class="topbar">
      <a class="brand" href="#/">
        <span class="brand__mark">💋</span>
        <span>Mwuah</span>
      </a>
      <div class="topbar__right">
        <span id="demoPill"></span>
        <span class="userchip" id="userchip"></span>
        <button class="btn btn--icon btn--ghost" id="logoutBtn" title="Sign out" aria-label="Sign out">🚪</button>
      </div>
    </header>

    <main id="content" class="container"></main>

    <nav class="bottomnav">
      <a class="navitem" data-route="/" href="#/">
        <span class="navitem__icon">🏠</span><span class="navitem__label">Home</span>
      </a>
      <a class="navitem" data-route="/expenses" href="#/expenses">
        <span class="navitem__icon">💸</span><span class="navitem__label">Spends</span>
      </a>
      <a class="navitem" data-route="/cycle" href="#/cycle">

      <a class="navitem" data-route="/meds" href="#/meds">
        <span class="navitem__icon">💊</span><span class="navitem__label">Meds</span>
      </a>
      <a class="navitem" data-route="/notes" href="#/notes">
        <span class="navitem__icon">📝</span><span class="navitem__label">Notes</span>
      </a>
      <a class="navitem" data-route="/bucket" href="#/bucket">
        <span class="navitem__icon">✨</span><span class="navitem__label">Bucket</span>
      </a>
      <a class="navitem" data-route="/memories" href="#/memories">
        <span class="navitem__icon">📸</span><span class="navitem__label">Memories</span>
      </a>
      <a class="navitem" data-route="/savings" href="#/savings">
        <span class="navitem__icon">🐷</span><span class="navitem__label">Savings</span>
      </a>
      <a class="navitem" data-route="/dates" href="#/dates">
        <span class="navitem__icon">📅</span><span class="navitem__label">Dates</span>
      </a>

  <script type="module" src="js/main.js"></script>
